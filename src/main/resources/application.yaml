spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: criandoAPI
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/apiParaEstudoDeAutomacao?createDatabaseIfNotExist=true&useTimezone=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100
        one-indexed-parameters: false

server:
  port: ${SERVER_PORT:8089}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/criandoAPI}

api:
  version-prefix: ${API_VERSION_PREFIX:/v1}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

springdoc:
  swagger-ui:
    path: ${api.version-prefix:/v1}/swagger-ui.html
  api-docs:
    path: ${api.version-prefix:/v1}/api-docs
